<html>
    <head>
        <style>
            .fb {
  display: flex;                  
  flex-direction: column;         
  justify-content: center;        
  align-items: center;            
  height:14 rem;
  width: 14 rem;              
  text-align: center;             
}

form {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.fb button {
            width: 100%; 
            padding: 10px;
            background-color: #4267B2; 
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        .fb button:hover {
            background-color: #365899; 
        }
.fb input {
            width: 100%; 
            padding: 10px;
            margin: 10px 0; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
            font-size: 16px; 
        }

.fb h1 {
            font-size: 32px; 
            text-align: center; 
            color: blue;
            margin-bottom: 20px;}
            
            button {color: white;
            background-color: blue;}
        </style>
        <title>
profile
        </title>
    </head>
    <body>
        <div class="fb">
            <h1>Facebook</h1>
            <form>
              <input type="email" placeholder="Email or phone number"><br><br>
              <input type="password" placeholder="Password"><br><br>
              <button type="submit">Login</button>
            </form>
          </div>
          
    </body>
</html>
